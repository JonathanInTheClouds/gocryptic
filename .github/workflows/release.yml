name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY="gocryptic-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "$BINARY" \
            .
          echo "BINARY=$BINARY" >> $GITHUB_ENV

      - name: Generate checksum
        run: sha256sum "$BINARY" > "$BINARY.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: |
            ${{ env.BINARY }}
            ${{ env.BINARY }}.sha256
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Combine checksums
        run: |
          cd dist
          cat *.sha256 > ../checksums.txt
          mv ../checksums.txt .

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          echo "Creating release for $TAG"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "GoCryptic ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## GoCryptic ${{ github.ref_name }}

            ### Installation

            **macOS / Linux (recommended):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            **Manual download:** Pick the binary for your platform from the assets below.

            **Verify integrity:**
            ```bash
            sha256sum -c checksums.txt
            ```

            ---

            See the [README](https://github.com/${{ github.repository }}#readme) for full usage documentation.
          files: |
            dist/gocryptic-*
            dist/checksums.txt
