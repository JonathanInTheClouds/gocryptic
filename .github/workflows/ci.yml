name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -v -race -count=1

      - name: Build binary
        run: go build -trimpath -ldflags="-s -w" -o gocryptic${{ matrix.os == 'windows-latest' && '.exe' || '' }} .

      - name: Integration tests (Unix only)
        if: matrix.os != 'windows-latest'
        run: bash test_realworld.sh
